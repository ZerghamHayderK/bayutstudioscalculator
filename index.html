<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayut Studios | Project Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #37b36f;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* --- SCREEN UI --- */
        @media screen {
            body { background-color: #000; color: white; font-family: 'Montserrat', sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; padding-bottom: 50px; }
            .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%); }
            .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: glisten var(--duration) infinite ease-in-out; }
            @keyframes glisten { 0%, 100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.3); } }

            .container { width: 90%; max-width: 850px; margin: 40px auto; text-align: center; }
            .logo-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px; }
            .main-logo { height: 60px; width: auto; object-fit: contain; }
            .logo-text { font-size: 2.8rem; font-weight: 900; color: var(--primary-green); margin: 0; text-transform: uppercase; }

            .glass-panel { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 35px; text-align: left; margin-bottom: 40px; }
            label { color: var(--primary-green); font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; display: block; margin-bottom: 8px; text-transform: uppercase; }
            select, input { width: 100%; padding: 14px; background: #000; border: 1px solid var(--glass-border); color: white; border-radius: 8px; margin-bottom: 20px; font-family: inherit; box-sizing: border-box; font-size: 1rem; }
            
            .btn-primary { width: 100%; padding: 18px; background: var(--primary-green); border: none; color: white; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; border-radius: 10px; cursor: pointer; transition: 0.3s; margin-top: 10px;}
            .btn-primary:hover { box-shadow: 0 0 20px var(--primary-green); transform: translateY(-2px); }

            .cart-item { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 15px; padding: 20px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; text-align: left;}
            .item-details h4 { margin: 0 0 10px 0; font-size: 1.1rem; color: #fff; font-weight: 700; }
            
            /* Quantity Selector Styling */
            .qty-edit { background: #111; color: var(--primary-green); border: 1px solid var(--primary-green); padding: 5px 10px; border-radius: 5px; font-weight: 700; font-family: inherit; width: 80px; }
            
            .item-pricing { text-align: right; margin-right: 20px; }
            .pkr-price { display: block; font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.2rem; }
            
            .btn-del { background: var(--primary-green); color: #000; border: none; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; transition: 0.2s; }
            .btn-del:hover { background: #ff4b4b; color: #fff; }
            
            .valuation-card { margin-top: 50px; background: linear-gradient(145deg, rgba(55, 179, 111, 0.15), rgba(0,0,0,0.5)); border: 2px solid var(--primary-green); border-radius: 20px; padding: 40px; backdrop-filter: blur(15px); }
            #invoice-print-area { display: none; } 
        }

        /* --- PRINT VIEW (PDF) --- */
        @media print {
            @page { size: A4 landscape; margin: 1cm; }
            body { background: white !important; color: black !important; }
            .container, .stars, #starField, button, .btn-del, .qty-edit { display: none !important; }
            
            #invoice-print-area { display: block !important; padding: 10px; background: white; }
            .invoice-header { border-bottom: 4px solid #37b36f; padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
            .print-logo-img { height: 60px; }
            
            table { width: 100%; border-collapse: collapse; margin: 15px 0; }
            th { text-align: left; background: #f2f2f2; padding: 10px; border-bottom: 2px solid #37b36f; font-size: 11px; text-transform: uppercase; color: black; }
            td { padding: 10px; border-bottom: 1px solid #eee; font-size: 11px; font-family: 'Inter', sans-serif; color: black; }
            
            .total-section { margin-top: 30px; text-align: right; }
            .total-pkr { font-size: 26px; font-weight: 900; color: black; }
            .footer { margin-top: 40px; text-align: center; font-size: 10px; color: #777; border-top: 1px solid #eee; padding-top: 15px; }
        }
    </style>
</head>
<body>
    <div class="stars" id="starField"></div>

    <div class="container">
        <div class="logo-container">
            <img src="wlogo.png" alt="Logo" class="main-logo">
            <h1 class="logo-text">Bayut Studios</h1>
        </div>
        <div style="letter-spacing: 8px; font-weight: 200; margin-bottom: 40px; opacity: 0.6; text-transform: uppercase;">Project Portal</div>

        <div class="glass-panel">
            <label>PROJECT CATEGORY</label>
            <select id="catSelect" onchange="updateProducts()"><option>Connecting to Engine...</option></select>
            
            <label>SERVICE PRODUCT</label>
            <select id="prodSelect"></select>
            
            <label>INITIAL QUANTITY</label>
            <input type="number" id="unitInput" value="1" min="1">

            <button class="btn-primary" onclick="addToProject()">Add to Project</button>
        </div>

        <div id="cartSection" style="display:none;">
            <div style="text-align: left; font-size: 0.9rem; letter-spacing: 4px; color: #555; font-weight: 900; margin-bottom: 20px; text-transform: uppercase;">Project Scope</div>
            <div id="cartList"></div>
            
            <div class="valuation-card">
                <p style="color: var(--primary-green); font-weight: 700; letter-spacing: 3px;">TOTAL PROJECT VALUATION</p>
                <h1 id="resPKR" style="font-size: 3.5rem; font-weight: 900; margin: 15px 0;">PKR 0</h1>
                <div style="display: flex; justify-content: center; gap: 40px; margin-bottom: 30px;">
                    <div><small>SAR</small><br><b id="resSAR" style="font-size: 1.5rem; color: var(--primary-green);">0</b></div>
                    <div><small>UAE (AED)</small><br><b id="resAED" style="font-size: 1.5rem; color: var(--primary-green);">0</b></div>
                </div>
                <button class="btn-primary" onclick="window.print()">Get Quotation (PDF)</button>
                <br><br>
                <span onclick="clearAll()" style="cursor:pointer; opacity:0.4; font-size:0.8rem; letter-spacing:2px; text-transform:uppercase;">Reset All</span>
            </div>
        </div>
    </div>

    <div id="invoice-print-area">
        <div class="invoice-header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <img src="wlogo.png" class="print-logo-img">
                <div style="font-size: 24px; font-weight: 900; color: #37b36f;">BAYUT STUDIOS</div>
            </div>
            <div style="text-align: right;">
                <div style="font-weight: 700; font-size: 14px;">PROJECT QUOTATION</div>
                <div id="inv-date" style="font-size: 12px;"></div>
            </div>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th width="50%">DESCRIPTION</th>
                    <th>QTY</th>
                    <th>TOTAL (SAR)</th>
                    <th>TOTAL (AED)</th>
                    <th>TOTAL (PKR)</th>
                </tr>
            </thead>
            <tbody id="print-rows"></tbody>
        </table>

        <div class="total-section">
            <div style="font-size: 12px; color: #777; text-transform: uppercase;">Grand Total Valuation</div>
            <div class="total-pkr" id="print-pkr"></div>
            <div style="font-weight: 700; font-size: 14px; margin-top: 5px;">
                SAR: <span id="print-sar"></span> | AED: <span id="print-aed"></span>
            </div>
        </div>

        <div class="footer">
            <p>Generated by Bayut Studios Project Portal. www.bayutstudios.com</p>
        </div>
    </div>

    <script>
        const SHEET_ID = '1qvBKlYH7q4dXsu7tEh9OLnKSydfONNRzGa-xjUYLB0g';
        const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        let db = [];
        let cart = [];

        function clean(v) { 
            if (v === null || v === undefined) return 0;
            let str = v.f ? v.f : String(v.v);
            let cleaned = str.replace(/[^0-9.]/g, ''); 
            return parseFloat(cleaned) || 0; 
        }

        fetch(DATA_URL).then(r => r.text()).then(t => {
            const j = JSON.parse(t.substr(47).slice(0, -2));
            db = j.table.rows.map(r => {
                const c = r.c;
                return c[0] && c[1] ? { 
                    cat: c[0].v, 
                    name: c[1].v, 
                    bQty: clean(c[2]) || 1, 
                    pkr: clean(c[4]), 
                    sar: clean(c[6]), 
                    aed: clean(c[7]) 
                } : null;
            }).filter(x => x);
            const cats = [...new Set(db.map(i => i.cat))];
            const sel = document.getElementById('catSelect');
            sel.innerHTML = '<option value="">Select Category</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
        });

        function updateProducts() {
            const cat = document.getElementById('catSelect').value;
            const sel = document.getElementById('prodSelect');
            sel.innerHTML = db.filter(i => i.cat === cat).map(i => `<option value="${i.name}">${i.name}</option>`).join('');
        }

        function addToProject() {
            const name = document.getElementById('prodSelect').value;
            const qty = parseInt(document.getElementById('unitInput').value) || 1;
            const item = db.find(i => i.name === name);
            
            if(item) {
                const unitPKR = (item.pkr / item.bQty);
                const unitSAR = (item.sar / item.bQty);
                const unitAED = (item.aed / item.bQty);

                const existing = cart.find(c => c.name === name);
                if(existing) {
                    existing.qty += qty;
                } else {
                    cart.push({ 
                        name, qty, 
                        uP: unitPKR, uS: unitSAR, uA: unitAED 
                    });
                }
                render();
            }
        }

        function updateQty(idx, newQty) {
            cart[idx].qty = parseInt(newQty) || 1;
            render();
        }

        function render() {
            const list = document.getElementById('cartList');
            const printList = document.getElementById('print-rows');
            document.getElementById('cartSection').style.display = cart.length ? 'block' : 'none';
            
            list.innerHTML = ''; printList.innerHTML = '';
            let TP = 0, TS = 0, TA = 0;

            cart.forEach((item, idx) => {
                const rowP = item.uP * item.qty;
                const rowS = item.uS * item.qty;
                const rowA = item.uA * item.qty;
                
                TP += rowP; TS += rowS; TA += rowA;
                
                list.innerHTML += `<div class="cart-item">
                    <div class="item-details">
                        <h4>${item.name}</h4>
                        <label style="display:inline-block; font-size:10px; margin-right:10px;">EDIT QTY:</label>
                        <input type="number" class="qty-edit" value="${item.qty}" min="1" onchange="updateQty(${idx}, this.value)">
                    </div>
                    <div class="item-pricing">
                        <span class="pkr-price">PKR ${Math.round(rowP).toLocaleString()}</span>
                        <div style="font-size:10px; opacity:0.6;">SAR ${rowS.toFixed(2)} | AED ${rowA.toFixed(2)}</div>
                    </div>
                    <button class="btn-del" onclick="cart.splice(${idx},1);render()">×</button></div>`;
                
                printList.innerHTML += `<tr>
                    <td>${item.name}</td><td>${item.qty}</td>
                    <td>${rowS.toFixed(2)}</td><td>${rowA.toFixed(2)}</td><td>${Math.round(rowP).toLocaleString()}</td>
                </tr>`;
            });

            document.getElementById('resPKR').innerText = `PKR ${Math.round(TP).toLocaleString()}`;
            document.getElementById('resSAR').innerText = TS.toFixed(2);
            document.getElementById('resAED').innerText = TA.toFixed(2);
            
            document.getElementById('print-pkr').innerText = `PKR ${Math.round(TP).toLocaleString()}`;
            document.getElementById('print-sar').innerText = TS.toFixed(2);
            document.getElementById('print-aed').innerText = TA.toFixed(2);
            document.getElementById('inv-date').innerText = new Date().toLocaleDateString();
        }

        function clearAll() { cart = []; render(); }

        const f = document.getElementById('starField');
        for(let i=0; i<150; i++) {
            const s = document.createElement('div'); s.className = 'star';
            const sz = Math.random() * 2 + 1 + 'px';
            s.style.width = sz; s.style.height = sz;
            s.style.top = Math.random()*100+'%'; s.style.left = Math.random()*100+'%';
            s.style.setProperty('--duration', Math.random()*3+2+'s');
            f.appendChild(s);
        }
    </script>
</body>
</html>
