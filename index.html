<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayut Studios | Price Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;700;900&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #37b36f;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: #000;
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: glisten var(--duration) infinite ease-in-out;
        }

        @keyframes glisten {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.3); box-shadow: 0 0 10px rgba(255,255,255,0.4); }
        }

        .container { width: 100%; max-width: 750px; padding: 20px; text-align: center; }

        .brand-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 5px;
        }

        .logo-img {
            height: 60px;
            width: auto;
        }

        .logo-text { 
            font-size: 3.5rem; 
            font-weight: 900; 
            color: var(--primary-green); 
            margin: 0;
        }

        .rich-header { 
            font-size: 1.8rem; 
            letter-spacing: 10px; 
            text-transform: uppercase; 
            margin-bottom: 30px; 
            font-weight: 200;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 35px;
            text-align: left;
        }

        label { color: var(--primary-green); font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; display: block; margin-bottom: 8px; }
        
        select, input {
            width: 100%; padding: 12px; background: #000; border: 1px solid var(--glass-border);
            color: white; border-radius: 6px; margin-bottom: 20px; font-family: inherit;
            box-sizing: border-box;
        }

        .btn-add {
            width: 100%; padding: 15px; background: var(--primary-green); border: none;
            color: white; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            border-radius: 8px; cursor: pointer; transition: 0.3s;
        }

        .btn-add:hover {
            box-shadow: 0 0 15px var(--primary-green);
            transform: translateY(-2px);
        }

        .valuation-card {
            margin-top: 30px; 
            background: rgba(55, 179, 111, 0.1); 
            border: 1px solid var(--primary-green);
            border-radius: 15px; 
            padding: 25px; 
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="stars" id="starField"></div>

    <div class="container">
        <div class="brand-container">
            <img src="wlogo.png" 
                 alt="Bayut Studios Logo" 
                 class="logo-img" 
                 onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='inline'">
            <span id="logo-fallback" style="display:none; font-size: 2.5rem; margin-right: 10px;">🏠</span>
            <h1 class="logo-text">Bayut Studios</h1>
        </div>
        <div class="rich-header">Price Calculator</div>

        <div class="glass-panel">
            <label>CATEGORY</label>
            <select id="catSelect" onchange="updateProducts()"><option>Loading Data...</option></select>

            <label>PRODUCT SERVICE</label>
            <select id="prodSelect"><option>Select Category First</option></select>

            <label>UNITS REQUIRED</label>
            <input type="number" id="unitInput" value="1" min="1">

            <button class="btn-add" onclick="calculate()">Add to Quotation</button>
        </div>

        <div id="resultCard" class="valuation-card">
            <p style="color: var(--primary-green); font-weight: 700; margin: 0; letter-spacing: 2px;">TOTAL VALUATION</p>
            <h1 id="resPKR" style="font-size: 3rem; margin: 10px 0;">PKR 0</h1>
            <div style="display: flex; justify-content: center; gap: 30px;">
                <div><small style="opacity: 0.6;">SAR</small><br><b id="resSAR" style="font-size: 1.2rem;">0</b></div>
                <div><small style="opacity: 0.6;">AED</small><br><b id="resAED" style="font-size: 1.2rem;">0</b></div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1qvBKlYH7q4dXsu7tEh9OLnKSydfONNRzGa-xjUYLB0g';
        const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        let rawData = [];

        fetch(DATA_URL)
            .then(res => res.text())
            .then(text => {
                const json = JSON.parse(text.substr(47).slice(0, -2));
                rawData = json.table.rows.map(row => ({
                    category: row.c[0]?.v,
                    product: row.c[1]?.v,
                    pkr: row.c[2]?.v || 0,
                    usd: row.c[3]?.v || 0,
                    sar: row.c[4]?.v || 0,
                    aed: row.c[5]?.v || 0 
                }));
                init();
            })
            .catch(err => {
                console.error("Error loading sheet:", err);
                document.getElementById('catSelect').innerHTML = "<option>Error Loading Sheet</option>";
            });

        function init() {
            const cats = [...new Set(rawData.map(i => i.category))].filter(Boolean);
            const sel = document.getElementById('catSelect');
            sel.innerHTML = '<option value="">Select Category</option>';
            cats.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
        }

        function updateProducts() {
            const cat = document.getElementById('catSelect').value;
            const sel = document.getElementById('prodSelect');
            sel.innerHTML = '<option value="">Select Product</option>';
            rawData.filter(i => i.category === cat)
                   .forEach(i => sel.innerHTML += `<option value="${i.product}">${i.product}</option>`);
        }

        function calculate() {
            const pName = document.getElementById('prodSelect').value;
            const units = parseInt(document.getElementById('unitInput').value) || 1;
            const item = rawData.find(i => i.product === pName);
            
            if(item) {
                document.getElementById('resPKR').innerText = `PKR ${(item.pkr * units).toLocaleString()}`;
                document.getElementById('resSAR').innerText = (item.sar * units).toLocaleString(undefined, {minimumFractionDigits: 2});
                document.getElementById('resAED').innerText = (item.aed * units).toLocaleString(undefined, {minimumFractionDigits: 2});
                document.getElementById('resultCard').style.display = 'block';
            }
        }

        const field = document.getElementById('starField');
        for(let i=0; i<120; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 2 + 1 + 'px';
            s.style.width = size; s.style.height = size;
            s.style.top = Math.random() * 100 + '%';
            s.style.left = Math.random() * 100 + '%';
            s.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            field.appendChild(s);
        }
    </script>
</body>
</html>
