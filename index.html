<html lang="en">

    <title>Bayut Studios | Global Quotation Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #37b36f;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: #000;
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: glisten var(--duration) infinite ease-in-out;
        }

        @keyframes glisten {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.3); }
        }

        .container { width: 95%; max-width: 900px; margin: 40px auto; text-align: center; }

        .logo-text { font-size: 3.5rem; font-weight: 900; color: var(--primary-green); margin: 0; }
        .rich-header { font-size: 1.5rem; letter-spacing: 12px; text-transform: uppercase; margin-bottom: 40px; font-weight: 200; opacity: 0.8; }

        /* Configuration Panel */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 35px;
            text-align: left;
            margin-bottom: 40px;
        }

        label { color: var(--primary-green); font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; display: block; margin-bottom: 8px; }
        
        select, input {
            width: 100%; padding: 14px; background: #000; border: 1px solid var(--glass-border);
            color: white; border-radius: 8px; margin-bottom: 20px; font-family: inherit;
            box-sizing: border-box; font-size: 1rem;
        }

        .btn-add {
            width: 100%; padding: 18px; background: var(--primary-green); border: none;
            color: white; font-weight: 900; text-transform: uppercase; letter-spacing: 3px;
            border-radius: 10px; cursor: pointer; transition: 0.3s;
        }

        .btn-add:hover { box-shadow: 0 10px 30px rgba(55, 179, 111, 0.4); transform: translateY(-2px); }

        /* Quotation List Styling */
        .list-header { text-align: left; letter-spacing: 5px; font-size: 0.9rem; margin: 40px 0 20px; color: #666; font-weight: 700; }

        .item-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 20px 25px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: fadeIn 0.4s ease-out;
            text-align: left;
        }

        .item-info { flex-grow: 1; }
        .item-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 5px; color: #fff; }
        .item-meta { font-family: 'Inter', sans-serif; font-size: 0.85rem; color: #888; }
        .item-meta b { color: var(--primary-green); font-weight: 900; }

        .item-prices { text-align: right; margin-right: 30px; min-width: 180px; }
        .pkr-main { font-size: 1.4rem; font-weight: 900; color: #fff; display: block; }
        .other-subs { font-size: 0.8rem; color: #666; font-weight: 700; margin-top: 4px; }
