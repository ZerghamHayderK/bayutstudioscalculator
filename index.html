<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayut Studios | Project Cart Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;700;900&family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #37b36f;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: #000;
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* STAR ENGINE */
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%); }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: glisten var(--duration) infinite ease-in-out; }
        @keyframes glisten { 0%, 100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.3); } }

        .container { width: 90%; max-width: 850px; margin: 40px auto; text-align: center; }
        .logo-text { font-size: 3.5rem; font-weight: 900; color: var(--primary-green); margin: 0; }
        .rich-header { font-size: 1.5rem; letter-spacing: 12px; text-transform: uppercase; margin-bottom: 30px; font-weight: 200; opacity: 0.8; }

        /* CONFIGURATION PANEL */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 35px;
            text-align: left;
            margin-bottom: 40px;
        }

        label { color: var(--primary-green); font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; display: block; margin-bottom: 8px; }
        
        select, input {
            width: 100%; padding: 14px; background: #000; border: 1px solid var(--glass-border);
            color: white; border-radius: 8px; margin-bottom: 20px; font-family: inherit;
            box-sizing: border-box; font-size: 1rem;
        }

        .btn-add {
            width: 100%; padding: 18px; background: var(--primary-green); border: none;
            color: white; font-weight: 900; text-transform: uppercase; letter-spacing: 3px;
            border-radius: 10px; cursor: pointer; transition: 0.3s;
        }

        .btn-add:hover { box-shadow: 0 0 20px var(--primary-green); transform: translateY(-2px); }

        /* PROJECT LIST / CART */
        .cart-header { text-align: left; font-size: 1rem; letter-spacing: 5px; color: #555; font-weight: 700; margin-bottom: 20px; text-transform: uppercase; }

        .cart-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .item-details { text-align: left; flex-grow: 1; }
        .item-details h4 { margin: 0; font-size: 1.1rem; font-weight: 700; color: #fff; }
        .item-details p { margin: 5px 0 0 0; font-size: 0.8rem; color: #888; }
        .item-details b { color: var(--primary-green); font-weight: 900; }

        .item-pricing { text-align: right; margin-right: 25px; }
        .pkr-price { display: block; font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.2rem; color: #fff; }
        .other-price { font-size: 0.75rem; color: #666; font-weight: 700; margin-top: 4px; }

        /* BIN BUTTON: GREEN BOX, BLACK ICON */
        .btn-del {
            background: var(--primary-green);
            color: #000;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .btn-del:hover { background: #fff; transform: scale(1.1); }

        /* TOTAL CARD */
        .valuation-card {
            margin-top: 50px; 
            background: linear-gradient(145deg, rgba(55, 179, 111, 0.15), rgba(0,0,0,0.5));
            border: 2px solid var(--primary-green);
            border-radius: 20px; 
            padding: 40px; 
            backdrop-filter: blur(15px);
        }

        .grand-total { font-size: 3.5rem; font-weight: 900; margin: 15px 0; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div class="stars" id="starField"></div>

    <div class="container">
        <h1 class="logo-text">Bayut Studios</h1>
        <div class="rich-header">Project Cart Engine</div>

        <div class="glass-panel">
            <label>PROJECT CATEGORY</label>
            <select id="catSelect" onchange="updateProducts()"><option>Syncing Data...</option></select>

            <label>SERVICE PRODUCT</label>
            <select id="prodSelect"><option>Select Category First</option></select>

            <label>QUANTITY</label>
            <input type="number" id="unitInput" value="1" min="1">

            <button class="btn-add" onclick="addToProject()">Add to Project</button>
        </div>

        <div id="projectScope" style="display: none;">
            <div class="cart-header">CURRENT PROJECT SCOPE</div>
            <div id="cartList"></div>

            <div class="valuation-card">
                <p style="color: var(--primary-green); font-weight: 700; margin: 0; letter-spacing: 4px; font-size: 0.8rem;">TOTAL VALUATION</p>
                <h1 id="resPKR" class="grand-total">PKR 0</h1>
                <div style="display: flex; justify-content: center; gap: 40px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 25px;">
                    <div><small style="opacity: 0.5; letter-spacing: 2px;">SAR TOTAL</small><br><b id="resSAR" style="font-size: 1.6rem; font-family: 'Inter'; font-weight: 900; color: var(--primary-green);">0</b></div>
                    <div><small style="opacity: 0.5; letter-spacing: 2px;">AED TOTAL</small><br><b id="resAED" style="font-size: 1.6rem; font-family: 'Inter'; font-weight: 900; color: var(--primary-green);">0</b></div>
                </div>
                <button onclick="clearProject()" style="background:transparent; border:none; color:#444; margin-top:30px; cursor:pointer; font-weight: 700; letter-spacing: 2px;">RESET ALL</button>
            </div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1qvBKlYH7q4dXsu7tEh9OLnKSydfONNRzGa-xjUYLB0g';
        const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        let masterData = [];
        let projectCart = [];

        function cleanValue(val) {
            if (!val) return 0;
            return parseFloat(String(val).replace(/[PKR|SAR|dh|\$|,]/gi, '')) || 0;
        }

        fetch(DATA_URL)
            .then(res => res.text())
            .then(text => {
                const json = JSON.parse(text.substr(47).slice(0, -2));
                masterData = json.table.rows.map(row => {
                    const c = row.c;
                    if (!c[0] || !c[1]) return null;
                    return {
                        category: c[0].v,
                        product:  c[1].v,
                        baseQty:  cleanValue(c[2]?.v) || 1,
                        pkr:      cleanValue(c[4]?.v),
                        sar:      cleanValue(c[6]?.v),
                        aed:      cleanValue(c[7]?.v)
                    };
                }).filter(i => i !== null);
                
                const cats = [...new Set(masterData.map(i => i.category))].filter(Boolean);
                const sel = document.getElementById('catSelect');
                sel.innerHTML = '<option value="">Select Category</option>';
                cats.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
            });

        function updateProducts() {
            const cat = document.getElementById('catSelect').value;
            const sel = document.getElementById('prodSelect');
            sel.innerHTML = '<option value="">Select Service</option>';
            masterData.filter(i => i.category === cat)
                      .forEach(i => sel.innerHTML += `<option value="${i.product}">${i.product}</option>`);
        }

        function addToProject() {
            const pName = document.getElementById('prodSelect').value;
            const userQty = parseInt(document.getElementById('unitInput').value) || 1;
            const item = masterData.find(i => i.product === pName);
            
            if(item) {
                // Calculate individual unit price correctly
                const unitPKR = item.pkr / item.baseQty;
                const unitSAR = item.sar / item.baseQty;
                const unitAED = item.aed / item.baseQty;

                projectCart.push({
                    name: item.product,
                    qty: userQty,
                    pkr: unitPKR * userQty,
                    sar: unitSAR * userQty,
                    aed: unitAED * userQty,
                    id: Date.now()
                });
                renderCart();
            }
        }

        function removeFromProject(id) {
            projectCart = projectCart.filter(item => item.id !== id);
            renderCart();
        }

        function clearProject() {
            projectCart = [];
            renderCart();
        }

        function renderCart() {
            const scopeDiv = document.getElementById('projectScope');
            const listDiv = document.getElementById('cartList');
            
            if(projectCart.length === 0) {
                scopeDiv.style.display = 'none';
                return;
            }

            scopeDiv.style.display = 'block';
            listDiv.innerHTML = '';

            let totalPKR = 0, totalSAR = 0, totalAED = 0;

            projectCart.forEach(item => {
                totalPKR += item.pkr; totalSAR += item.sar; totalAED += item.aed;
                listDiv.innerHTML += `
                    <div class="cart-item">
                        <div class="item-details">
                            <h4>${item.name}</h4>
                            <p>QTY: <b>${item.qty}</b></p>
                        </div>
                        <div class="item-pricing">
                            <span class="pkr-price">PKR ${item.pkr.toLocaleString(undefined, {maximumFractionDigits:0})}</span>
                            <div class="other-price">SAR ${item.sar.toLocaleString(undefined, {minimumFractionDigits:2})} | UAE ${item.aed.toLocaleString(undefined, {minimumFractionDigits:2})}</div>
                        </div>
                        <button class="btn-del" onclick="removeFromProject(${item.id})">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                `;
            });

            document.getElementById('resPKR').innerText = `PKR ${totalPKR.toLocaleString(undefined, {maximumFractionDigits:0})}`;
            document.getElementById('resSAR').innerText = totalSAR.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
            document.getElementById('resAED').innerText = totalAED.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
        }

        const field = document.getElementById('starField');
        for(let i=0; i<120; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 2 + 1 + 'px';
            s.style.width = size; s.style.height = size;
            s.style.top = Math.random() * 100 + '%';
            s.style.left = Math.random() * 100 + '%';
            s.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            field.appendChild(s);
        }
    </script>
</body>
</html>
