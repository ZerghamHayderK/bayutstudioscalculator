<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayut Studios | Price Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700;900&family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* --- DASHBOARD THEME (PRESERVED) --- */
        body { transition: background-color 0.4s ease; margin: 0; min-height: 100vh; display: flex; box-sizing: border-box; gap: 25px; padding: 25px; overflow-x: hidden; }
        body.dark-mode { --primary: #37b36f; --bg-color: #050505; --panel-bg: rgba(20, 20, 20, 0.8); --glass-border: rgba(255, 255, 255, 0.1); --text-color: white; --input-bg: rgba(0,0,0,0.6); --sub-text: rgba(255,255,255,0.6); background-color: var(--bg-color); color: var(--text-color); font-family: 'Montserrat', sans-serif; }
        body.light-mode { --primary: #0d9488; --bg-color: #f8fafc; --panel-bg: rgba(255, 255, 255, 0.85); --glass-border: rgba(0, 0, 0, 0.1); --text-color: #0f172a; --input-bg: #ffffff; --sub-text: #475569; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); color: var(--text-color); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        body.light-mode .stars { display: none; }
        body.dark-mode .stars { display: block; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%); }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: glisten var(--duration) infinite ease-in-out; }
        @keyframes glisten { 0%, 100% { opacity: 0.1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.2); } }
        
        .theme-toggle { position: fixed; top: 20px; right: 20px; z-index: 1000; background: var(--primary); border: none; width: 45px; height: 45px; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s; }
        .sidebar { width: 260px; background: var(--panel-bg); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); padding: 30px 20px; display: flex; flex-direction: column; gap: 20px; border-radius: 30px; height: calc(100vh - 50px); box-sizing: border-box; overflow-y: auto; position: sticky; top: 25px; }
        .section-title { color: var(--primary); font-size: 0.7rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; border-left: 3px solid var(--primary); padding-left: 10px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.6rem; color: var(--sub-text); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        input, select { background: var(--input-bg); border: 1px solid var(--glass-border); color: var(--text-color); padding: 12px; border-radius: 12px; font-family: inherit; font-size: 0.85rem; outline: none; width: 100%; box-sizing: border-box; }
        
        .main-content { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .logo-block { display: flex; align-items: center; gap: 12px; }
        .logo-text { font-size: 1.8rem; font-weight: 900; color: var(--primary); margin: 0; letter-spacing: -1px; }
        
        .btn-top { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 14px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; }
        body.dark-mode .btn-top { color: black; }

        .card { background: var(--panel-bg); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 30px; padding: 30px; }
        .builder-row { display: grid; grid-template-columns: 1.5fr 1.5fr 0.5fr 1fr; gap: 15px; align-items: flex-end; }
        .btn-add { background: var(--text-color); color: var(--bg-color); border: none; padding: 14px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }
        body.dark-mode .btn-add { background: var(--primary); color: black; }
        
        .quote-item { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); padding: 20px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        body.light-mode .quote-item { background: rgba(0,0,0,0.02); }
        .qty-edit { width: 65px !important; padding: 5px !important; text-align: center; border-radius: 8px !important; margin-left: 10px; border: 1px solid var(--primary) !important; background: var(--input-bg); color: var(--text-color); }
        .btn-remove { background: #ff4b4b; color: white; border: none; width: 32px; height: 32px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        .valuation-card { background: linear-gradient(135deg, rgba(55, 179, 111, 0.1) 0%, rgba(0,0,0,0.05) 100%); border: 2px solid var(--primary); padding: 30px; border-radius: 25px; text-align: right; margin-top: 10px; }
        .total-val { font-size: 2.5rem; font-weight: 900; color: var(--primary); margin: 0; font-family: 'Inter'; }
        .currency-switcher { display: flex; background: rgba(0, 0, 0, 0.2); padding: 4px; border-radius: 12px; gap: 4px; border: 1px solid var(--glass-border); }
        .cur-pill { border: none; background: transparent; color: var(--text-color); padding: 6px 16px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; font-weight: 800; transition: all 0.3s ease; opacity: 0.6; }
        .cur-pill.active { background: var(--primary); color: white !important; opacity: 1; }

        @media screen and (max-width: 850px) {
            body { flex-direction: column; padding: 15px; gap: 20px; }
            .sidebar { width: 100%; height: auto; position: relative; top: 0; border-radius: 20px; order: 2; }
            .main-content { order: 1; }
            .builder-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="dark-mode">
    <div class="stars" id="starField"></div>
    <aside class="sidebar">
        <button id="themeBtn" class="btn-top" onclick="toggleTheme()" style="width:100%; margin-bottom:10px;">Light Mode</button>
        <div class="input-group">
            <div class="section-title">Client Info</div>
            <label>Client Name</label>
            <input type="text" id="clientNameInput" placeholder="Enter name">
        </div>
        <div class="input-group">
            <label>Client Email</label>
            <input type="email" id="clientEmailInput" placeholder="Enter email">
        </div>
        <div class="input-group">
            <label>Client Address</label>
            <input type="text" id="clientAddressInput" placeholder="Enter address">
        </div>
        <div class="input-group">
            <div class="section-title">Adjustments</div>
            <label>Overall Discount (%)</label>
            <input type="number" id="globalDiscountInput" value="0" step="0.5" oninput="render()">
        </div>
        <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--glass-border);">
            <div class="section-title">Status</div>
            <p id="status" style="font-size: 0.6rem; opacity: 0.5;">Connecting...</p>
        </div>
    </aside>

    <main class="main-content">
        <div class="header">
            <div class="logo-block">
                <img src="Blogo.png" alt="Logo" style="height:40px" onerror="this.style.display='none'">
                <h1 class="logo-text">Bayut Studios | Price Calculator</h1>
            </div>
            <div class="btn-header-group" style="display: flex; gap: 10px;">
                <button class="btn-top" onclick="openProductList()" style="background: transparent; border: 1px solid var(--primary); color: var(--primary);">Browse Products</button>
                <button class="btn-top" onclick="generateInvoice()">Download PDF</button>
            </div>
        </div>
        
        <div class="card builder-card">
            <div class="section-title" style="margin-bottom: 20px;">Quote Builder</div>
            <div class="builder-row">
                <div class="input-group">
                    <label>Category</label>
                    <select id="catSelect" onchange="updateProducts()"><option>Syncing...</option></select>
                </div>
                <div class="input-group">
                    <label>Product</label>
                    <select id="prodSelect"></select>
                </div>
                <div class="input-group">
                    <label>Units</label>
                    <input type="number" id="unitInput" value="1" min="1">
                </div>
                <button class="btn-add" onclick="addToQuote()">Add to Quote</button>
            </div>
        </div>

        <div class="card summary-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 10px;">
                <div class="section-title">Total Project Scope</div>
                <div class="currency-switcher">
                    <button id="btn-PKR" class="cur-pill active" onclick="setCurrency('PKR')">PKR</button>
                    <button id="btn-USD" class="cur-pill" onclick="setCurrency('USD')">USD</button>
                    <button id="btn-SAR" class="cur-pill" onclick="setCurrency('SAR')">SAR</button>
                    <button id="btn-AED" class="cur-pill" onclick="setCurrency('AED')">AED</button>
                </div>
            </div>
            <div id="cartList"></div>
            <div id="valuationBox" style="display:none;" class="valuation-card">
                <div class="section-title" style="margin-bottom: 10px; border:none; padding:0;">Estimated Valuation</div>
                <p id="mainTotal" class="total-val">PKR 0</p>
                <p id="subTotals" style="opacity:0.7; font-size:1rem; margin-top:5px;"></p>
                <p id="discountSummary" style="font-size: 0.85rem; color: var(--primary); font-weight: 700; margin-top: 10px;"></p>
            </div>
        </div>
    </main>

    <script>
        const SHEET_ID = '1qvBKlYH7q4dXsu7tEh9OLnKSydfONNRzGa-xjUYLB0g';
        const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx:out:json`;
        let db = [], cart = [], activeCur = 'PKR';

        const savedTheme = localStorage.getItem('theme') || 'dark-mode';
        document.body.className = savedTheme;

        function toggleTheme() {
            const body = document.body;
            const newTheme = body.classList.contains('dark-mode') ? 'light-mode' : 'dark-mode';
            body.className = newTheme;
            document.getElementById('themeBtn').innerText = newTheme === 'dark-mode' ? 'Light Mode' : 'Dark Mode';
            localStorage.setItem('theme', newTheme);
        }

        // Comma formatting helper
        function fCom(val) {
            return Math.round(val).toLocaleString('en-US');
        }

        window.receiveProductSelection = function(productName) {
            const item = db.find(i => i.name === productName);
            if (item) { cart.push({ ...item, qty: 1 }); render(); }
        };

        function openProductList() {
            const listWindow = window.open('', '_blank');
            const isDark = document.body.classList.contains('dark-mode');
            const cur = activeCur;
            const cats = [...new Set(db.map(i => i.cat))];
            
            listWindow.document.write(`
                <html>
                <head>
                    <title>Registry | Bayut Studios</title>
                    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
                    <style>
                        :root {
                            --primary: ${isDark ? '#37b36f' : '#0d9488'};
                            --bg: ${isDark ? '#050505' : '#f8fafc'};
                            --text: ${isDark ? '#ffffff' : '#0f172a'};
                            --row-bg: ${isDark ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.03)'};
                        }
                        body { font-family: 'Inter', sans-serif; padding: 40px; background: var(--bg); color: var(--text); }
                        h1 { color: var(--primary); font-weight: 900; margin: 0; text-transform: uppercase; }
                        .controls { display: flex; gap: 10px; margin: 30px 0; background: var(--row-bg); padding: 15px; border-radius: 15px; }
                        .controls input, .controls select { flex: 1; padding: 10px; background: ${isDark ? '#111' : '#fff'}; border: 1px solid var(--primary); color: var(--text); border-radius: 8px; font-family: inherit; }
                        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
                        th { text-align: left; padding: 15px; font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--primary); border-bottom: 2px solid var(--primary); }
                        td { padding: 20px 15px; background: var(--row-bg); font-size: 13px; vertical-align: middle; }
                        .btn-cart { background: var(--primary); color: ${isDark ? '#000' : '#fff'}; border: none; width: 45px; height: 45px; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
                        .btn-cart:hover { transform: scale(1.1); opacity: 0.9; }
                    </style>
                </head>
                <body>
                    <h1>Service Registry</h1>
                    <div class="controls">
                        <select id="catFilter" onchange="applyFilters()"><option value="">All Categories</option>${cats.map(c => `<option value="${c}">${c}</option>`).join('')}</select>
                        <input type="text" id="nameSearch" placeholder="Search product..." oninput="applyFilters()">
                    </div>
                    <table><thead><tr><th width="15%">Category</th><th width="20%">Product</th><th width="12%">Price</th><th width="10%">Lead Time</th><th width="33%">Details</th><th width="10%">Add</th></tr></thead><tbody id="registryBody"></tbody></table>
                    <script>
                        const data = ${JSON.stringify(db)};
                        const cur = "${cur}";
                        function renderTable(items) {
                            document.getElementById('registryBody').innerHTML = items.map(i => {
                                let v = i[cur.toLowerCase()];
                                let d = Math.round(v).toLocaleString('en-US');
                                return \`<tr>
                                    <td><span style="font-weight:800; color:var(--primary)">\${i.cat}</span></td>
                                    <td style="font-weight:700;">\${i.name}</td>
                                    <td style="font-weight:800; color:var(--primary)">\${cur} \${d}</td>
                                    <td style="opacity:0.7">\${i.time}</td>
                                    <td style="opacity:0.6; font-size:12px;">\${i.details}</td>
                                    <td><button class="btn-cart" onclick="selectProduct('\${i.name}')" title="Add to Scope">+ 🛒</button></td>
                                </tr>\`;
                            }).join('');
                        }
                        function selectProduct(n) {
                            if(window.opener) {
                                window.opener.receiveProductSelection(n);
                                const btn = event.currentTarget;
                                btn.innerHTML = "✓";
                                btn.style.background = "#fff"; btn.style.color = "#000";
                                setTimeout(() => { btn.innerHTML = "+ 🛒"; btn.style.background = "var(--primary)"; btn.style.color = "${isDark ? '#000' : '#fff'}"; }, 800);
                            }
                        }
                        function applyFilters() {
                            const c = document.getElementById('catFilter').value;
                            const s = document.getElementById('nameSearch').value.toLowerCase();
                            renderTable(data.filter(i => (c === "" || i.cat === c) && i.name.toLowerCase().includes(s)));
                        }
                        renderTable(data);
                    <\/script>
                </body>
                </html>
            `);
            listWindow.document.close();
        }

        function parseCell(cell) { if (!cell) return 0; let val = cell.f ? cell.f : String(cell.v); return parseFloat(val.replace(/[^0-9.]/g, '')) || 0; }
        function cellStr(c) { if(!c) return "On Request"; const o = c.f ? c.f : (c.v !== undefined ? String(c.v) : "Standard"); return (o === "null" || o === "") ? "Standard" : o; }

        fetch(DATA_URL).then(r => r.text()).then(t => {
            const data = JSON.parse(t.substr(47).slice(0, -2));
            db = data.table.rows.map(r => { const c = r.c; return c[0] && c[1] ? { cat: c[0].v, name: c[1].v, bQty: parseCell(c[2]) || 1, pkr: parseCell(c[4]), usd: parseCell(c[5]), sar: parseCell(c[6]), aed: parseCell(c[7]), time: cellStr(c[13]), details: cellStr(c[14]) } : null; }).filter(x => x);
            const cats = [...new Set(db.map(i => i.cat))];
            document.getElementById('catSelect').innerHTML = '<option value="">Select Category</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('status').innerText = "Live: Synchronized";
        });

        function updateProducts() { const cat = document.getElementById('catSelect').value; document.getElementById('prodSelect').innerHTML = db.filter(i => i.cat === cat).map(i => `<option value="${i.name}">${i.name}</option>`).join(''); }
        function setCurrency(code) { activeCur = code; document.querySelectorAll('.cur-pill').forEach(b => b.classList.remove('active')); document.getElementById('btn-' + code).classList.add('active'); render(); }
        function addToQuote() { const name = document.getElementById('prodSelect').value; const qty = parseInt(document.getElementById('unitInput').value) || 1; const item = db.find(i => i.name === name); if (item) { cart.push({ ...item, qty }); render(); } }
        function updateQty(idx, val) { cart[idx].qty = parseInt(val) || 1; render(); }

        function render() {
            const list = document.getElementById('cartList'); const valBox = document.getElementById('valuationBox'); 
            const discInput = parseFloat(document.getElementById('globalDiscountInput').value) || 0;
            list.innerHTML = ''; let sums = { pkr: 0, sar: 0, aed: 0, usd: 0 };
            if (cart.length > 0) valBox.style.display = 'block'; else valBox.style.display = 'none';
            cart.forEach((item, idx) => {
                const p = (item.pkr / item.bQty) * item.qty; const s = (item.sar / item.bQty) * item.qty; const a = (item.aed / item.bQty) * item.qty; const u = (item.usd / item.bQty) * item.qty;
                sums.pkr += p; sums.sar += s; sums.aed += a; sums.usd += u;
                const dVal = fCom(sums[activeCur.toLowerCase()] / (sums.pkr || 1) * p); // Logic to keep relative currency weight but whole numbers
                
                list.innerHTML += `<div class="quote-item"><div><b>${item.name}</b><br><small>Qty: <input type="number" class="qty-edit" value="${item.qty}" min="1" onchange="updateQty(${idx}, this.value)"></small></div><div style="display:flex; align-items:center; gap:15px;"><span style="font-weight:900;">${activeCur} ${fCom(iP(item, activeCur))}</span><button class="btn-remove" onclick="cart.splice(${idx},1);render()">×</button></div></div>`;
            });
            const discMulti = 1 - (discInput / 100);
            const rawVal = sums[activeCur.toLowerCase()];
            const displayTotal = fCom(rawVal * discMulti);
            document.getElementById('mainTotal').innerText = `${activeCur} ${displayTotal}`;
            document.getElementById('subTotals').innerText = `SAR ${fCom(sums.sar * discMulti)} | AED ${fCom(sums.aed * discMulti)} | USD ${fCom(sums.usd * discMulti)}`;
            document.getElementById('discountSummary').innerText = discInput > 0 ? `Reduced by ${discInput}% discount` : "";
        }

        // Helper to get individual item price in active currency
        function iP(item, cur) {
            return (item[cur.toLowerCase()] / item.bQty) * item.qty;
        }

        function generateInvoice() {
            if (cart.length === 0) return alert("Please add items first!");
            const clientName = document.getElementById('clientNameInput').value || "<Client Representative>";
            const clientEmail = document.getElementById('clientEmailInput').value || "<Email>";
            const clientAddress = document.getElementById('clientAddressInput').value || "<Address>";
            const discountPercent = parseFloat(document.getElementById('globalDiscountInput').value) || 0;
            const printWindow = window.open('', '_blank');
            const date = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });
            let sums = { pkr: 0, aed: 0 };
            let rows = cart.map(item => {
                const p = (item.pkr / item.bQty) * item.qty; const a = (item.aed / item.bQty) * item.qty; sums.pkr += p; sums.aed += a;
                return `<tr><td>${item.name}</td><td style="text-align:center">${item.qty}</td><td>PKR ${fCom(p)}</td><td style="font-weight:bold">dh ${fCom(a)}</td></tr>`;
            }).join('');
            const dAED = sums.aed * (1 - (discountPercent / 100));
            printWindow.document.write(`<html><head><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"><style>body { font-family: 'Inter', sans-serif; padding: 40mm 20mm; color: #1a1a1a; -webkit-print-color-adjust: exact; }.header-logo { display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 800; font-size: 28px; color: #37b36f; margin-bottom: 20px; }.title-banner { background: #37b36f; color: white; text-align: center; padding: 12px; font-size: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 40px; font-size: 11px; }table { width: 100%; border-collapse: collapse; margin-top: 10px; }th { background: #37b36f; color: white; font-size: 10px; text-transform: uppercase; padding: 12px 8px; text-align: left; }td { padding: 12px 8px; border-bottom: 1px solid #eee; font-size: 11px; }.due-box { background: #37b36f; color: white; padding: 15px 20px; margin-top: 10px; display: flex; justify-content: space-between; font-weight: 800; font-size: 16px; }</style></head><body><div class="header-logo"><img src="Blogo.png" style="height:40px"> Bayut Studios</div><div class="title-banner">Project Proposal</div><div class="info-grid"><div><strong>Billed From:</strong><br>Bayut Studios<br>Dubai Design District, Dubai</div><div style="text-align:right"><strong>Billed To:</strong><br>${clientName}<br>${clientEmail}<br>${clientAddress}</div></div><table><thead><tr><th>Category</th><th style="text-align:center">Units</th><th>Price (PKR)</th><th>Price (AED)</th></tr></thead><tbody>${rows}</tbody></table><div style="text-align:right; margin-top:20px; font-size:12px">DISCOUNT: ${discountPercent}%</div><div class="due-box"><span>Total Project Value</span><span>dh ${fCom(dAED)}</span></div></body></html>`);
            printWindow.document.close();
            setTimeout(() => printWindow.print(), 500);
        }

        const f = document.getElementById('starField'); for (let i = 0; i < 180; i++) { const s = document.createElement('div'); s.className = 'star'; const size = (Math.random() * 1.2 + 0.3) + 'px'; s.style.width = s.style.height = size; s.style.top = Math.random() * 100 + '%'; s.style.left = Math.random() * 100 + '%'; s.style.setProperty('--duration', (Math.random() * 4 + 2) + 's'); f.appendChild(s); }
    </script>
</body>
</html>
